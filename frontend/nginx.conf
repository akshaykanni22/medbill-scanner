# Temp paths to /tmp — writable by non-root UID 101
client_body_temp_path /tmp/client_temp;
proxy_temp_path        /tmp/proxy_temp;
fastcgi_temp_path      /tmp/fastcgi_temp;
uwsgi_temp_path        /tmp/uwsgi_temp;
scgi_temp_path         /tmp/scgi_temp;

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 1000;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';" always;

    # Static assets — long cache TTL (fingerprinted by CRA)
    # WHY repeat security headers: nginx add_header directives in a child location block
    # DO NOT inherit parent-level add_header directives. They must be re-declared here
    # or the security headers will be absent on all static asset responses.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';" always;
    }

    # API proxy — forward /api/* to the backend container
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # SPA fallback — all unmatched routes serve index.html
    # (React Router handles client-side routing)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
